<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Web Testing Agent</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(120deg, #7f00ff, #e100ff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #ffffff;
            width: 90%;
            max-width: 900px;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #6a00cc;
        }

        .subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 25px;
        }

        label {
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        button {
            padding: 12px 16px;
            background: #7f00ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background: #5a00b3;
        }

        .run-btn {
            width: 100%;
            margin-top: 20px;
        }

        .status {
            margin-top: 15px;
            font-weight: 600;
            text-align: center;
        }

        .success { color: green; }
        .error { color: red; }

        .output {
            margin-top: 20px;
        }

        .box {
            background: #f4f6f8;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            max-height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .tabs {
            margin-top: 25px;
            text-align: center;
        }

        .section {
            display: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>AI Web Testing Agent</h1>
    <p class="subtitle">Test websites using natural language instructions</p>

    <label>Enter Test Instruction</label>
    <textarea id="instruction"
        ></textarea>

    <button class="run-btn" onclick="runTest()">Run Test</button>

    <div class="status" id="status"></div>

    <!-- TAB BUTTONS -->
    <div class="tabs">
        <button onclick="showSection('stepsSection')">Parsed Steps</button>
        <button onclick="showSection('codeSection')">Playwright Code</button>
        <button onclick="showSection('reportSection')">Final Report</button>
    </div>

    <!-- SECTIONS -->
    <div class="output section" id="stepsSection">
        <h3>Parsed Test Steps</h3>
        <div class="box" id="steps">Waiting...</div>
    </div>

    <div class="output section" id="codeSection">
        <h3>Generated Playwright Code</h3>
        <div class="box" id="code">Waiting...</div>
    </div>

    <div class="output section" id="reportSection">
        <h3>Final Test Report</h3>
        <div class="box" id="report">Waiting...</div>
    </div>

</div>

<script>
function showSection(id) {
    document.querySelectorAll(".section").forEach(sec => {
        sec.style.display = "none";
    });
    document.getElementById(id).style.display = "block";
}

async function runTest() {
    const instruction = document.getElementById("instruction").value.trim();
    const status = document.getElementById("status");

    if (!instruction) {
        status.textContent = "⚠️ Please enter an instruction.";
        status.className = "status error";
        return;
    }

    status.textContent = "⏳ Running test...";
    status.className = "status";

    document.getElementById("steps").textContent = "Processing...";
    document.getElementById("code").textContent = "Processing...";
    document.getElementById("report").textContent = "Processing...";

    try {
        const response = await fetch("/run-test", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ instruction })
        });

        const data = await response.json();

        if (data.status === "success") {
            status.textContent = "✅ Test executed successfully";
            status.className = "status success";

            document.getElementById("steps").textContent =
                JSON.stringify(data.parsed_steps, null, 2);

            document.getElementById("code").textContent =
                data.playwright_code || "No code generated";

            document.getElementById("report").textContent =
                JSON.stringify(data.report || {}, null, 2);

            showSection("stepsSection"); // default open
        } else {
            status.textContent = "❌ " + (data.message || "Test failed");
            status.className = "status error";
        }

    } catch (error) {
        status.textContent = "❌ Backend connection failed";
        status.className = "status error";
        console.error(error);
    }
}
</script>

</body>
</html>
